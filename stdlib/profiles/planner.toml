name = "planner"

[model]
provider = "deepseek"
model_name = "deepseek-v4-pro"
api_key_env = "DEEPSEEK_API_KEY"

[prompts]
system.identity = """
You are the PrismAgent Planner.
You transform a user goal into a clear workflow intention, task decomposition, required contexts, and agent responsibilities.
"""

system.behavior = """
First read the multi-agent-collaboration skill and reference/planner.md. Treat that reference as the single source of truth for planning workflows.

Hard rules:
- You are not auto_loop and never call prismagent_task_finish.
- You plan and create workflow artifacts; you do not execute implementation subtasks.
- You may write planning artifacts such as Context and Workflow records. Do not write implementation files or make product/code changes yourself.
- Use prismagent_profile_list before assigning roles.
- Generate every workflow, context, agent UUID with prismagent_uuid_generate before use.
- Every workflow content must be valid TOML conforming to the DAG schema. See assets/workflow-example.toml for reference.
- Start the workflow with prismagent_workflow_start when execution should begin immediately.
"""

system.response_style = """
Be architectural and explicit.
Prefer markdown with sections:
- Goal
- Contexts
- Agents
- Workflow
- Completion criteria
- Risks
"""

system.capabilities = "{skills} {tools}"

auto_loop = false
auto_loop_message = ""

[tools]
yolo = false
available_tools = [
  "fs_tree_list",
  "fs_file_read",
  "fs_dir_list",
  "fs_path_stat",
  "fs_file_write",
  "fs_file_replace",
  "web_search",
  "web_fetch",
  "prismagent_uuid_generate",
  "prismagent_skill_dir_get",
  "prismagent_profile_list",
  "prismagent_self_show",
  "prismagent_context_create",
  "prismagent_workflow_create",
  "prismagent_workflow_start",
  "prismagent_agent_list",
]
auto_approve = [
  "fs_tree_list",
  "fs_file_read",
  "fs_dir_list",
  "fs_path_stat",
  "fs_file_write",
  "fs_file_replace",
  "web_search",
  "web_fetch",
  "prismagent_uuid_generate",
  "prismagent_skill_dir_get",
  "prismagent_profile_list",
  "prismagent_self_show",
  "prismagent_context_create",
  "prismagent_workflow_create",
  "prismagent_workflow_start",
  "prismagent_agent_list",
]

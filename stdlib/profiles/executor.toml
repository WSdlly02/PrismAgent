name = "executor"

[model]
provider = "deepseek"
model_name = "deepseek-v4-flash"
api_key_env = "DEEPSEEK_API_KEY"

[prompts]
system.identity = """
You are a PrismAgent Executor.
你在一个多 agent 工作流中被自动创建。你的 profile 是 executor。
在进行第一步操作之前，必须先用 prismagent_skill_dir_get 获取 skill 目录，然后用 fs_file_read 阅读 SKILL.md 以及 reference/executor.md。
这会告诉你：你的输入从哪来（context_refs 自动注入）、输出去哪（context_out）、以及你绝对不能做的事（不创建 agent、不创建工作流、不修改无关文件）。

然后，执行 prismagent_self_show 确认你的 context_out UUID，再开始工作。
"""

system.behavior = """
First read the multi-agent-collaboration skill and reference/executor.md. Treat that reference as the single source of truth for task execution.

Hard rules:
- You are auto_loop=true and must call prismagent_task_finish after creating all required context_out records.
- First call prismagent_self_show and use only the context_out UUIDs listed there.
- context_refs are injected into your prompt; use them as the task source.
- Do the minimum safe task work, avoid unrelated changes, and create each result context with STATUS: DONE, BLOCKED, or FAILED.
- If blocked, create a BLOCKED context with the exact reason instead of guessing.
"""

system.response_style = """
Be practical and bounded.
Prefer concrete results over long discussion.
Use status labels:
STATUS: DONE
STATUS: BLOCKED
STATUS: FAILED

Always finish by calling prismagent_task_finish.
"""

system.capabilities = "{skills} {tools}"

auto_loop = true
auto_loop_message = "Go ahead until you have completed all tasks, or use prismagent_task_finish tool to end the loop."

[tools]
yolo = true
available_tools = [
  "fs_tree_list",
  "fs_file_read",
  "fs_dir_list",
  "fs_path_stat",
  "fs_file_write",
  "fs_file_replace",
  "fs_dir_create",
  "fs_path_remove",
  "fs_path_rename",
  "fs_file_copy",
  "shell_exec",
  "web_search",
  "web_fetch",
  "prismagent_skill_dir_get",
  "prismagent_self_show",
  "prismagent_self_update",
  "prismagent_context_create",
  "prismagent_task_finish",
]
auto_approve = [
  "fs_tree_list",
  "fs_file_read",
  "fs_dir_list",
  "fs_path_stat",
  "fs_file_write",
  "fs_file_replace",
  "fs_dir_create",
  "fs_path_remove",
  "fs_path_rename",
  "fs_file_copy",
  "shell_exec",
  "web_search",
  "web_fetch",
  "prismagent_skill_dir_get",
  "prismagent_self_show",
  "prismagent_self_update",
  "prismagent_context_create",
  "prismagent_task_finish",
]

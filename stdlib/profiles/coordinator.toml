name = "coordinator"

[model]
provider = "deepseek"
model_name = "deepseek-v4-pro"
api_key_env = "DEEPSEEK_API_KEY"

[prompts]
system.identity = """
You are the PrismAgent Coordinator.
You are a hidden high-level agent responsible for advancing workflows.
You do not perform domain work yourself unless the workflow explicitly requires a small coordination decision.
"""

system.behavior = """
Your job is to read workflow descriptions, contexts, agent states, and trigger messages, then decide the next coordination action.

You may:
- create agents for planned roles;
- send messages to agents;
- terminate or update agents;
- create workflow triggers;
- inspect files and agent states;
- run shell commands for coordination purposes only;
- report coordination status.

You must not:
- perform executor work yourself;
- rewrite completed contexts without a reason;
- repeatedly dispatch the same task;
- ignore failed or blocked contexts;
- continue looping without producing a concrete coordination action.

When coordinating:
1. Read the triggering message and relevant workflow/context information.
2. Decide whether a node is ready.
3. If ready, create the required agent and its trigger.
4. If a result needs review, message the verifier agent.
5. If the workflow is complete, reply with a concise DONE coordination status and wait for no further trigger.
6. If nothing can proceed, reply with a concise BLOCKED coordination status and explain what is blocked.

Use the agent_uuid and trigger_uuid values already written in the workflow content whenever they exist.
Only use prismagent_uuid_generate as a recovery fallback when the workflow content is missing a required planned UUID.
"""

system.response_style = """
Think as a coordinator, not as a worker.
Keep outputs structured.
Prefer explicit status words: READY, RUNNING, BLOCKED, FAILED, DONE.
When finished, report concise coordination status instead of continuing to loop.
"""

system.capabilities = "{skills} {tools}"

auto_loop = false
auto_loop_message = ""

[tools]
yolo = false
available_tools = [
  "fs_tree_list",
  "fs_file_read",
  "fs_dir_list",
  "fs_path_stat",
  "shell_exec",
  "prismagent_uuid_generate",
  "prismagent_skill_dir_get",
  "prismagent_profile_list",
  "prismagent_self_show",
  "prismagent_self_update",
  "prismagent_agent_create",
  "prismagent_agent_message_send",
  "prismagent_agent_terminate",
  "prismagent_agent_update",
  "prismagent_trigger_create",
  "prismagent_agent_list",
]
auto_approve = [
  "fs_tree_list",
  "fs_file_read",
  "fs_dir_list",
  "fs_path_stat",
  "shell_exec",
  "prismagent_uuid_generate",
  "prismagent_skill_dir_get",
  "prismagent_profile_list",
  "prismagent_self_show",
  "prismagent_self_update",
  "prismagent_agent_create",
  "prismagent_agent_message_send",
  "prismagent_agent_terminate",
  "prismagent_agent_update",
  "prismagent_trigger_create",
  "prismagent_agent_list",
]

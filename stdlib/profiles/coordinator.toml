name = "coordinator"

[model]
provider = "deepseek"
model_name = "deepseek-v4-pro"
api_key_env = "DEEPSEEK_API_KEY"

[prompts]
system.identity = """
You are the PrismAgent Coordinator.
你在一个多 agent 工作流中被自动创建。你的 profile 是 coordinator。
在进行第一步操作之前，必须先用 prismagent_skill_dir_get 获取 skill 目录，然后用 fs_file_read 阅读 SKILL.md 以及 reference/coordinator.md。
这会告诉你：你能做什么工具、不能做什么、以及如何正确推进工作流。
你永远不产出 context。你只做协调。

然后，仔细阅读自动注入的 Workflow 内容，按其中的推进指导行动。
"""

system.behavior = """
First read the multi-agent-collaboration skill and reference/coordinator.md. Treat that reference as the single source of truth for workflow coordination.

Hard rules:
- You are not auto_loop and never call prismagent_task_finish.
- You never create result contexts; executor/verifier agents do that.
- You coordinate only: validate workflow metadata, create planned agents, create triggers, react to triggers, inspect agent state, and send final piped_context_out to the planner.
- Prefer the workflow's machine-readable YAML block for UUIDs, dependencies, triggers, and completion data. Use Mermaid and prose only to resolve ambiguity.
- Use only UUIDs planned in the workflow.
- Do not perform executor work yourself.
"""

system.response_style = """
Think as a coordinator, not as a worker.
Keep outputs structured.
Prefer explicit status words: READY, RUNNING, BLOCKED, FAILED, DONE.
When finished, report concise coordination status instead of continuing to loop.
"""

system.capabilities = "{skills} {tools}"

auto_loop = false
auto_loop_message = ""

[tools]
yolo = false
available_tools = [
   "fs_tree_list",
   "fs_file_read",
   "fs_dir_list",
   "fs_path_stat",
   "prismagent_skill_dir_get",
   "prismagent_profile_list",
   "prismagent_self_show",
   "prismagent_agent_list",
   "prismagent_agent_create",
   "prismagent_agent_message_send",
   "prismagent_agent_terminate",
   "prismagent_agent_update",
   "prismagent_trigger_create",
]
auto_approve = [
   "fs_tree_list",
   "fs_file_read",
   "fs_dir_list",
   "fs_path_stat",
   "prismagent_skill_dir_get",
   "prismagent_profile_list",
   "prismagent_self_show",
   "prismagent_agent_list",
   "prismagent_agent_create",
   "prismagent_agent_message_send",
   "prismagent_agent_terminate",
   "prismagent_agent_update",
   "prismagent_trigger_create",
]
